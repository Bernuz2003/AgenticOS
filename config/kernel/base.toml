[network]
host = "127.0.0.1"
port = 6380
poll_timeout_ms = 500
log_connections = false

[paths]
models_dir = "../../models"
workspace_dir = "../../workspace"
database_path = "../../workspace/agenticos.db"
checkpoint_path = "../../workspace/checkpoint.json"
kernel_token_path = "../../workspace/.kernel_token"
remote_provider_catalog_path = "../../config/providers/remote_providers.toml"

[memory]
swap_async = true
swap_dir = "../../workspace/swap"
token_slot_quota_per_pid = 8192

[resources]
ram_budget_bytes = 0
vram_budget_bytes = 0
min_ram_headroom_bytes = 0
min_vram_headroom_bytes = 0
local_runtime_ram_scale = 1.15
local_runtime_vram_scale = 1.05
local_runtime_ram_overhead_bytes = 268435456
local_runtime_vram_overhead_bytes = 134217728
max_queue_entries = 32

[context]
default_strategy = "sliding"
default_window_tokens = 2048
compaction_trigger_tokens = 1792
compaction_target_tokens = 1536
retrieve_top_k = 3
retrieve_candidate_limit = 64
retrieve_max_segment_chars = 768
retrieve_min_score = 0.12

[checkpoint]
interval_secs = 0

[auth]
disabled = false

[external_llamacpp]
executable = "/home/bernuz/llama.cpp/build/bin/llama-server"
port_base = 8080
startup_timeout_ms = 120000
health_poll_ms = 250
legacy_endpoint_override = ""
timeout_ms = 600000
chunk_tokens = 8

[openai_responses]
endpoint = "https://api.openai.com/v1"
default_model = ""
timeout_ms = 120000
max_request_bytes = 524288
max_response_bytes = 4194304
stream = true
input_price_usd_per_mtok = 0.0
output_price_usd_per_mtok = 0.0

[groq_responses]
endpoint = "https://api.groq.com/openai/v1"
default_model = "llama-3.3-70b-versatile"
timeout_ms = 120000
max_request_bytes = 524288
max_response_bytes = 4194304
stream = true
input_price_usd_per_mtok = 0.0
output_price_usd_per_mtok = 0.0

[openrouter]
endpoint = "https://openrouter.ai/api/v1"
default_model = "qwen/qwen3-4b:free"
timeout_ms = 120000
max_request_bytes = 524288
max_response_bytes = 4194304
stream = true
input_price_usd_per_mtok = 0.0
output_price_usd_per_mtok = 0.0
http_referer = "http://localhost"
app_title = "AgenticOS"

[exec]
auto_switch = false

[orchestrator]
max_output_chars = 4096

[tools]
sandbox_mode = "host"
allow_host_fallback = true
timeout_s = 600
max_calls_per_window = 12
window_s = 10
error_burst_kill = 3
output_truncate_len = 2000
audit_log_file = "syscall_audit.log"
temp_script_prefix = "agent_script_"

[generation.llama]
temperature = 0.7
top_p = 0.9
seed = 299792458
max_tokens = 500

[generation.qwen]
temperature = 0.7
top_p = 0.9
seed = 299792458
max_tokens = 500

[generation.mistral]
temperature = 0.7
top_p = 0.92
seed = 299792458
max_tokens = 500

[generation.unknown]
temperature = 0.7
top_p = 0.9
seed = 299792458
max_tokens = 500

[scheduler.fast]
max_tokens = 512
max_syscalls = 2

[scheduler.code]
max_tokens = 4096
max_syscalls = 16

[scheduler.reasoning]
max_tokens = 8192
max_syscalls = 8

[scheduler.general]
max_tokens = 2048
max_syscalls = 8

[evaluation.llama3]
model_path = "models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"
inactivity_timeout = 6.0
first_byte_timeout = 60.0
max_total = 180.0
ping_timeout = 3.0
ping_inactivity = 1.0
load_timeout = 90.0
load_inactivity = 3.0
threshold_first_chunk = 55.0
threshold_min_bytes = 25
threshold_total = 180.0
threshold_failed_runs = 2
report_path = "reports/llama3_eval_report.json"
run_count = 1

[evaluation.swarm]
report_path = "reports/swarm_benchmark.json"
repeat = 1
